name: mini-dc-digital-twin

services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: mini-dc-mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_PORT}:1883"
    volumes:
      - ../mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: mini-dc-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ../clickhouse/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../clickhouse/sql/views.sql:/docker-entrypoint-initdb.d/02-views.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://127.0.0.1:8123/ping | grep -q Ok
      interval: 10s
      timeout: 3s
      retries: 12

  postgres:
    image: postgres:16-alpine
    container_name: mini-dc-event-store
    restart: unless-stopped
    ports:
      - "${EVENT_STORE_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${EVENT_STORE_USER}
      POSTGRES_PASSWORD: ${EVENT_STORE_PASSWORD}
      POSTGRES_DB: ${EVENT_STORE_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 3s
      retries: 12

  api:
    build:
      context: ../../apps/api
    image: mini-dc-app:latest
    container_name: mini-dc-api
    restart: unless-stopped
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "${API_PORT}:8000"
    environment: &app_environment
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      MQTT_TOPIC_ROOT: ${MQTT_TOPIC_ROOT}
      INGEST_BATCH_SIZE: ${INGEST_BATCH_SIZE:-100}
      INGEST_FLUSH_SECONDS: ${INGEST_FLUSH_SECONDS:-5.0}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE}
      EVENT_STORE_ENABLED: ${EVENT_STORE_ENABLED:-true}
      EVENT_STORE_HOST: postgres
      EVENT_STORE_PORT: 5432
      EVENT_STORE_USER: ${EVENT_STORE_USER}
      EVENT_STORE_PASSWORD: ${EVENT_STORE_PASSWORD}
      EVENT_STORE_DATABASE: ${EVENT_STORE_DATABASE}
      SITE_NAME: ${SITE_NAME}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}
      SIMULATOR_CONTROL_PATH: /runtime/simulator-control.json
    volumes:
      - simulator_runtime:/runtime
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 12

  frontend:
    build:
      context: ../../apps/operator-console
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_GRAFANA_BASE_URL: ${VITE_GRAFANA_BASE_URL:-http://localhost:3000}
    image: mini-dc-frontend:latest
    container_name: mini-dc-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - api
      - grafana

  ingest:
    image: mini-dc-app:latest
    container_name: mini-dc-ingest
    restart: unless-stopped
    command: python -m app.ingest
    environment: *app_environment
    depends_on:
      api:
        condition: service_started
      clickhouse:
        condition: service_healthy
      mqtt:
        condition: service_started

  simulator:
    image: mini-dc-app:latest
    container_name: mini-dc-simulator
    restart: unless-stopped
    command: python -m app.simulator
    environment:
      <<: *app_environment
      SIM_INTERVAL_SECONDS: ${SIM_INTERVAL_SECONDS:-2.0}
    volumes:
      - simulator_runtime:/runtime
    depends_on:
      - api
      - mqtt

  alerting:
    image: mini-dc-app:latest
    container_name: mini-dc-alerting
    restart: unless-stopped
    command: python -m app.alerting --interval-seconds ${ALERT_INTERVAL_SECONDS:-30}
    environment: *app_environment
    depends_on:
      api:
        condition: service_started
      clickhouse:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: mini-dc-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  maintenance-model:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    image: mini-dc-app:latest
    container_name: mini-dc-maintenance-model
    command:
      - python
      - -m
      - app.maintenance_model
      - --interval-seconds
      - ${MAINTENANCE_MODEL_INTERVAL_SECONDS:-300}
      - --hours
      - ${MAINTENANCE_MODEL_LOOKBACK_HOURS:-24}
      - --window-minutes
      - ${MAINTENANCE_MODEL_WINDOW_MINUTES:-30}
      - --limit
      - ${MAINTENANCE_MODEL_ROW_LIMIT:-100000}
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE}
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    container_name: mini-dc-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dc-operations-overview.json
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource,grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      clickhouse:
        condition: service_healthy
      prometheus:
        condition: service_started

volumes:
  clickhouse_data:
  grafana_data:
  simulator_runtime:
  postgres_data:
